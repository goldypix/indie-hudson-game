<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Indie & Hudson Adventure</title>

  <meta property="og:type" content="website">
  <meta property="og:title" content="Indie & Hudson's Adventure">
  <meta property="og:description" content="A side-scrolling co-op platformer starring Indie and Hudson.">
  <meta property="og:url" content="https://goldy.xyz/indie-and-hudson-game/">
  <meta property="og:image" content="https://goldy.xyz/indie-and-hudson-game/assets/ui/og-preview.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="674">
  <meta property="og:image:type" content="image/jpeg">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Indie & Hudson's Adventure">
  <meta name="twitter:description" content="A side-scrolling co-op platformer starring Indie and Hudson.">
  <meta name="twitter:image" content="https://goldy.xyz/indie-and-hudson-game/assets/ui/og-preview.jpg">
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: #1a1a1a; overflow: hidden;
      font-family: system-ui, sans-serif;
      -webkit-user-select: none; user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }
    body { display: flex; justify-content: center; align-items: center; }
    #game canvas { display: block; }

    #touch-controls {
      position: fixed; inset: 0; pointer-events: none; z-index: 10;
      display: none;
    }
    .pad {
      position: absolute;
      bottom: calc(env(safe-area-inset-bottom, 0) + 18px);
      display: flex; gap: 14px; pointer-events: auto;
      align-items: flex-end;
    }
    .pad.left  { left:  calc(env(safe-area-inset-left, 0)  + 18px); }
    .pad.right { right: calc(env(safe-area-inset-right, 0) + 18px); }
    .btn {
      width: 76px; height: 76px; border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.30);
      color: rgba(255,255,255,0.55); font-weight: 600; font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      touch-action: none; user-select: none; -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      padding: 0;
      transition: background 0.08s ease, transform 0.08s ease, border-color 0.08s ease;
    }
    .btn.arrow { font-size: 28px; line-height: 1; }
    .btn.jump  { width: 88px; height: 88px; font-size: 14px; }
    .btn:active,
    .btn.pressed {
      background: rgba(255,255,255,0.22);
      border-color: rgba(255,255,255,0.6);
      color: rgba(255,255,255,0.95);
      transform: scale(0.92);
    }

    @media (hover: none) and (pointer: coarse) {
      #touch-controls { display: block; }
    }

    .portrait-warn {
      display: none; position: fixed; inset: 0;
      background: #1a1a1a; color: #fff; z-index: 100;
      align-items: center; justify-content: center;
      font-size: 22px; text-align: center; padding: 24px; line-height: 1.5;
    }
    @media (orientation: portrait) and (max-width: 900px) {
      .portrait-warn { display: flex; }
      #touch-controls { display: none; }
    }
  </style>
</head>
<body>
  <div id="game"></div>

  <div id="touch-controls">
    <div class="pad left">
      <button class="btn arrow" data-key="ArrowLeft"  data-keycode="37" aria-label="Left">◀</button>
      <button class="btn arrow" data-key="ArrowRight" data-keycode="39" aria-label="Right">▶</button>
    </div>
    <div class="pad right">
      <button class="btn eat"  data-key="e"         data-keycode="69" aria-label="Eat">EAT</button>
      <button class="btn jump" data-key="ArrowUp"   data-keycode="38" aria-label="Jump">JUMP</button>
    </div>
  </div>

  <div class="portrait-warn">📱↻<br>Rotate your phone sideways<br>to play</div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <script>
    const __v = Date.now();
    [
      'src/entities/Player.js',
      'src/entities/Rock.js',
      'src/entities/Koji.js',
      'src/gamepad.js',
      'src/audio.js',
      'src/scenes/BootScene.js',
      'src/scenes/MenuScene.js',
      'src/scenes/Level1Scene.js',
      'src/touch.js',
      'src/main.js'
    ].forEach(s => {
      document.write(`<script src="${s}?v=${__v}"><\/script>`);
    });
  </script>
</body>
</html>
